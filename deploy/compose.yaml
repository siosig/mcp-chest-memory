# LAN deployment: one backend container, SQLite persisted on the host.
#
#   CHEST_API_TOKEN=$(openssl rand -hex 32) docker compose up -d
#
# Clients register with:
#   ./tools/install.sh --remote http://<host-ip>:8765 --token <same token>
#
# Keep replicas at 1 — a single writer process owns the SQLite file.
services:
  chest:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: chest-memory:latest
    container_name: chest-memory
    restart: unless-stopped
    # Run as the host service user (uid 993 / gid 980 = dainipc-service).
    # The data directory must be owned by that uid on the host:
    #   sudo mkdir -p /opt/dainipc-service/chest-memory/data
    #   sudo chown -R dainipc-service:dainipc-service /opt/dainipc-service/chest-memory
    user: "993:980"
    ports:
      # Published on all interfaces by default. To restrict to this host, change
      # to "127.0.0.1:8765:8765" and front the backend with a reverse proxy. The
      # backend also honors CHEST_BIND_HOST for the in-container listen address.
      - "8765:8765"
    environment:
      CHEST_API_TOKEN: ${CHEST_API_TOKEN:?set CHEST_API_TOKEN (e.g. openssl rand -hex 32)}
    volumes:
      # Host-persisted database + model cache: survives container re-creation.
      - /opt/dainipc-service/chest-memory/data:/data
